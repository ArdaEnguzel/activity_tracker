spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products,/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: product-service
                fallbackUri: forward:/fallback/product-service
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders,/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: order-service
                fallbackUri: forward:/fallback/order-service

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-service
                fallbackUri: forward:/fallback/user-service

        - id: event-producer
          uri: lb://event-producer
          predicates:
            - Path=/api/events,/api/events/**
          filters:
            - name: CircuitBreaker
              args:
                name: event-producer
                fallbackUri: forward:/fallback/event-producer

server:
  port: 8085

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true
